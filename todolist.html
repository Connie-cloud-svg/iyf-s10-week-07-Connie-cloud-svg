<!Doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To do List</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>My To-Do List</h1>
      </header>
      <p
        class="subtitle"
        style="
          font-family: &quot;Playfair Display&quot;, serif;
          font-size: 0.85rem;
          color: #666161;
          text-align: center;
          margin-bottom: 1.8rem;
          letter-spacing: 0.02rem;
        "
      >
        Built with DOM manipulation & event listeners.
      </p>
      <section class="todo-list">
        <ul class="stats">
          <li class="stat">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="stat-total">0</div>
          </li>
          <li class="stat">
            <div class="stat-label">Active</div>
            <div class="stat-value" id="stat-active">0</div>
          </li>
          <li class="stat">
            <div class="stat-label">Completed</div>
            <div class="stat-value" id="stat-completed">0</div>
          </li>
        </ul>
      </section>
      <section class="input-row">
        <input
          type="text"
          id="task-input"
          placeholder="Add a new task..."
          required
        />
        <button
          class="btn-add"
          id="add-btn"
          style="background-color: blue; color: antiquewhite"
        >
          Add Task
        </button>
      </section>
      <section class="filters">
       <button id="filterAll" class="filter-btn active" data-filter="all">All</button>
       <button id="filterActive" class="filter-btn" data-filter="active">Active</button>
       <button id="filterCompleted" class="filter-btn" data-filter="completed">Completed</button>
      </section>
      <section class="task-list" id="task-list">
        <p class="empty-msg" id="empty-msg">No tasks yet. Add one above!</p>
      </section>
      <section class="bottom-bar">
        <button id="clearCompleted" class="btn-clear">Clear Completed</button>
      </section>
    </main>
    <script src="./interactive.js"></script>
  </body>
</html>
